<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0a06"/>
      <stop offset="100%" stop-color="#100e08"/>
    </linearGradient>
    <linearGradient id="skyGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffbe63" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <!-- Base -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Sky glow -->
  <rect width="1920" height="600" fill="url(#skyGlow)"/>
  <!-- Floor -->
  <polygon points="0,650 960,550 1920,650 1920,1080 0,1080" fill="#0a0806" opacity="0.8"/>
  <!-- Cityscape through floor-to-ceiling windows -->
  <!-- Building 1 (tall, left) -->
  <rect x="100" y="120" width="120" height="480" fill="#0e0c08" opacity="0.5"/>
  <g opacity="0.06">
    <rect x="110" y="140" width="20" height="12" fill="#ffbe63"/>
    <rect x="140" y="140" width="20" height="12" fill="#ffbe63"/>
    <rect x="170" y="140" width="20" height="12" fill="#ffbe63"/>
    <rect x="110" y="180" width="20" height="12" fill="#ffbe63"/>
    <rect x="170" y="180" width="20" height="12" fill="#ffbe63"/>
    <rect x="110" y="220" width="20" height="12" fill="#ffbe63"/>
    <rect x="140" y="220" width="20" height="12" fill="#ffbe63"/>
    <rect x="140" y="260" width="20" height="12" fill="#ffbe63"/>
    <rect x="170" y="260" width="20" height="12" fill="#ffbe63"/>
    <rect x="110" y="340" width="20" height="12" fill="#ffbe63"/>
    <rect x="170" y="340" width="20" height="12" fill="#ffbe63"/>
    <rect x="140" y="380" width="20" height="12" fill="#ffbe63"/>
    <rect x="110" y="420" width="20" height="12" fill="#ffbe63"/>
    <rect x="170" y="460" width="20" height="12" fill="#ffbe63"/>
  </g>
  <!-- Building 2 (medium, center-left) -->
  <rect x="300" y="200" width="150" height="400" fill="#0e0c08" opacity="0.4"/>
  <g opacity="0.05">
    <rect x="315" y="220" width="25" height="14" fill="#ffbe63"/>
    <rect x="355" y="220" width="25" height="14" fill="#ffbe63"/>
    <rect x="395" y="220" width="25" height="14" fill="#ffbe63"/>
    <rect x="315" y="270" width="25" height="14" fill="#ffbe63"/>
    <rect x="395" y="270" width="25" height="14" fill="#ffbe63"/>
    <rect x="355" y="320" width="25" height="14" fill="#ffbe63"/>
    <rect x="315" y="370" width="25" height="14" fill="#ffbe63"/>
    <rect x="395" y="370" width="25" height="14" fill="#ffbe63"/>
    <rect x="355" y="420" width="25" height="14" fill="#ffbe63"/>
    <rect x="315" y="470" width="25" height="14" fill="#ffbe63"/>
  </g>
  <!-- Building 3 (tall, center-right) -->
  <rect x="1400" y="100" width="140" height="500" fill="#0e0c08" opacity="0.45"/>
  <g opacity="0.05">
    <rect x="1415" y="130" width="22" height="12" fill="#ffbe63"/>
    <rect x="1450" y="130" width="22" height="12" fill="#ffbe63"/>
    <rect x="1485" y="130" width="22" height="12" fill="#ffbe63"/>
    <rect x="1415" y="180" width="22" height="12" fill="#ffbe63"/>
    <rect x="1485" y="180" width="22" height="12" fill="#ffbe63"/>
    <rect x="1450" y="230" width="22" height="12" fill="#ffbe63"/>
    <rect x="1415" y="330" width="22" height="12" fill="#ffbe63"/>
    <rect x="1450" y="380" width="22" height="12" fill="#ffbe63"/>
    <rect x="1485" y="430" width="22" height="12" fill="#ffbe63"/>
    <rect x="1415" y="480" width="22" height="12" fill="#ffbe63"/>
  </g>
  <!-- Building 4 (short, right) -->
  <rect x="1620" y="280" width="200" height="320" fill="#0e0c08" opacity="0.35"/>
  <g opacity="0.04">
    <rect x="1640" y="300" width="30" height="16" fill="#ffbe63"/>
    <rect x="1700" y="300" width="30" height="16" fill="#ffbe63"/>
    <rect x="1760" y="300" width="30" height="16" fill="#ffbe63"/>
    <rect x="1640" y="360" width="30" height="16" fill="#ffbe63"/>
    <rect x="1760" y="360" width="30" height="16" fill="#ffbe63"/>
    <rect x="1700" y="420" width="30" height="16" fill="#ffbe63"/>
    <rect x="1640" y="480" width="30" height="16" fill="#ffbe63"/>
  </g>
  <!-- Window frame pillars (floor-to-ceiling glass) -->
  <line x1="480" y1="0" x2="480" y2="650" stroke="#ffbe63" stroke-opacity="0.04" stroke-width="2"/>
  <line x1="960" y1="0" x2="960" y2="650" stroke="#ffbe63" stroke-opacity="0.05" stroke-width="2"/>
  <line x1="1380" y1="0" x2="1380" y2="650" stroke="#ffbe63" stroke-opacity="0.04" stroke-width="2"/>
  <!-- Desk/table -->
  <rect x="600" y="680" width="720" height="30" rx="4" fill="#0e0c08" opacity="0.8"/>
  <rect x="600" y="680" width="720" height="30" rx="4" fill="none" stroke="#ffbe63" stroke-opacity="0.05" stroke-width="0.5"/>
  <!-- Overhead warm light -->
  <ellipse cx="960" cy="0" rx="500" ry="180" fill="#ffbe63" opacity="0.015"/>
</svg>
