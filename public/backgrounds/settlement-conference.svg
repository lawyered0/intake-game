<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080610"/>
      <stop offset="100%" stop-color="#0c0a14"/>
    </linearGradient>
  </defs>
  <!-- Base -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Floor -->
  <polygon points="0,620 960,520 1920,620 1920,1080 0,1080" fill="#0a0814" opacity="0.7"/>
  <!-- Wood paneling (vertical strips) -->
  <g opacity="0.03">
    <rect x="0" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="96" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="192" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="288" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="384" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="480" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="576" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="672" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="768" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="864" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="960" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="1056" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="1152" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="1248" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="1344" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="1440" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="1536" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="1632" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="1728" y="0" width="80" height="620" fill="#a78bfa"/>
    <rect x="1824" y="0" width="80" height="620" fill="#a78bfa"/>
  </g>
  <!-- Panel groove lines -->
  <g stroke="#a78bfa" stroke-opacity="0.05" stroke-width="0.5">
    <line x1="88" y1="0" x2="88" y2="620"/>
    <line x1="184" y1="0" x2="184" y2="620"/>
    <line x1="280" y1="0" x2="280" y2="620"/>
    <line x1="376" y1="0" x2="376" y2="620"/>
    <line x1="472" y1="0" x2="472" y2="620"/>
    <line x1="568" y1="0" x2="568" y2="620"/>
    <line x1="664" y1="0" x2="664" y2="620"/>
    <line x1="760" y1="0" x2="760" y2="620"/>
    <line x1="856" y1="0" x2="856" y2="620"/>
    <line x1="952" y1="0" x2="952" y2="620"/>
    <line x1="1048" y1="0" x2="1048" y2="620"/>
    <line x1="1144" y1="0" x2="1144" y2="620"/>
    <line x1="1240" y1="0" x2="1240" y2="620"/>
    <line x1="1336" y1="0" x2="1336" y2="620"/>
    <line x1="1432" y1="0" x2="1432" y2="620"/>
    <line x1="1528" y1="0" x2="1528" y2="620"/>
    <line x1="1624" y1="0" x2="1624" y2="620"/>
    <line x1="1720" y1="0" x2="1720" y2="620"/>
    <line x1="1816" y1="0" x2="1816" y2="620"/>
  </g>
  <!-- Chair rail / molding line -->
  <line x1="0" y1="350" x2="1920" y2="350" stroke="#a78bfa" stroke-opacity="0.06" stroke-width="2"/>
  <line x1="0" y1="354" x2="1920" y2="354" stroke="#a78bfa" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Crown molding -->
  <line x1="0" y1="40" x2="1920" y2="40" stroke="#a78bfa" stroke-opacity="0.04" stroke-width="2"/>
  <!-- Seal / emblem on back wall (centered circle) -->
  <circle cx="960" cy="200" r="80" fill="none" stroke="#a78bfa" stroke-opacity="0.05" stroke-width="2"/>
  <circle cx="960" cy="200" r="60" fill="none" stroke="#a78bfa" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Scales of justice in emblem -->
  <line x1="930" y1="190" x2="990" y2="190" stroke="#a78bfa" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="960" y1="170" x2="960" y2="190" stroke="#a78bfa" stroke-opacity="0.06" stroke-width="1"/>
  <path d="M930 190 L934 200 L946 200 L950 190" fill="none" stroke="#a78bfa" stroke-opacity="0.04" stroke-width="0.8"/>
  <path d="M970 190 L974 200 L986 200 L990 190" fill="none" stroke="#a78bfa" stroke-opacity="0.04" stroke-width="0.8"/>
  <!-- Heavy desk/bench -->
  <rect x="400" y="660" width="1120" height="40" rx="4" fill="#0c0a16" opacity="0.85"/>
  <rect x="400" y="660" width="1120" height="40" rx="4" fill="none" stroke="#a78bfa" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Judge/mediator elevated area -->
  <rect x="700" y="440" width="520" height="180" rx="4" fill="#0a0814" opacity="0.6"/>
  <rect x="700" y="440" width="520" height="180" rx="4" fill="none" stroke="#a78bfa" stroke-opacity="0.04" stroke-width="0.5"/>
  <!-- Overhead light -->
  <ellipse cx="960" cy="0" rx="400" ry="160" fill="#a78bfa" opacity="0.015"/>
