<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060810"/>
      <stop offset="100%" stop-color="#0a0c14"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1829"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
  </defs>
  <!-- Base -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- Floor plane -->
  <polygon points="0,700 960,580 1920,700 1920,1080 0,1080" fill="#080a12" opacity="0.8"/>
  <!-- Back wall windows (glass office) -->
  <rect x="100" y="80" width="400" height="500" rx="2" fill="url(#window)" opacity="0.4"/>
  <rect x="540" y="80" width="400" height="500" rx="2" fill="url(#window)" opacity="0.35"/>
  <rect x="980" y="80" width="400" height="500" rx="2" fill="url(#window)" opacity="0.3"/>
  <rect x="1420" y="80" width="400" height="500" rx="2" fill="url(#window)" opacity="0.25"/>
  <!-- Window mullions -->
  <line x1="300" y1="80" x2="300" y2="580" stroke="#5baaff" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="740" y1="80" x2="740" y2="580" stroke="#5baaff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="1180" y1="80" x2="1180" y2="580" stroke="#5baaff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="1620" y1="80" x2="1620" y2="580" stroke="#5baaff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Horizontal mullions -->
  <line x1="100" y1="280" x2="1820" y2="280" stroke="#5baaff" stroke-opacity="0.04" stroke-width="0.5"/>
  <line x1="100" y1="430" x2="1820" y2="430" stroke="#5baaff" stroke-opacity="0.03" stroke-width="0.5"/>
  <!-- City lights through windows (distant) -->
  <rect x="150" y="320" width="3" height="60" fill="#5baaff" opacity="0.06"/>
  <rect x="200" y="280" width="2" height="100" fill="#5baaff" opacity="0.04"/>
  <rect x="260" y="300" width="4" height="80" fill="#5baaff" opacity="0.05"/>
  <rect x="600" y="260" width="3" height="120" fill="#5baaff" opacity="0.04"/>
  <rect x="680" y="300" width="2" height="80" fill="#5baaff" opacity="0.05"/>
  <rect x="1050" y="280" width="3" height="100" fill="#5baaff" opacity="0.03"/>
  <rect x="1500" y="300" width="2" height="80" fill="#5baaff" opacity="0.03"/>
  <!-- Conference table (long, dark) -->
  <ellipse cx="960" cy="720" rx="500" ry="60" fill="#0c0e18" opacity="0.9"/>
  <ellipse cx="960" cy="718" rx="490" ry="55" fill="none" stroke="#5baaff" stroke-opacity="0.06" stroke-width="1"/>
  <!-- Chair silhouettes -->
  <rect x="500" y="670" width="40" height="60" rx="8" fill="#0a0c14" opacity="0.7"/>
  <rect x="620" y="660" width="40" height="60" rx="8" fill="#0a0c14" opacity="0.6"/>
  <rect x="1260" y="660" width="40" height="60" rx="8" fill="#0a0c14" opacity="0.6"/>
  <rect x="1380" y="670" width="40" height="60" rx="8" fill="#0a0c14" opacity="0.7"/>
  <!-- Overhead light glow -->
  <ellipse cx="960" cy="0" rx="600" ry="200" fill="#5baaff" opacity="0.02"/>
  <!-- Screen/monitor on wall -->
  <rect x="800" y="140" width="320" height="200" rx="4" fill="#080a14" opacity="0.6"/>
  <rect x="804" y="144" width="312" height="192" rx="2" fill="none" stroke="#5baaff" stroke-opacity="0.08" stroke-width="0.5"/>
</svg>
